name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Validate distributions
        run: python -m twine check dist/*

      - name: Verify version matches tag
        run: |
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch: pyproject.toml=$PKG_VERSION tag=$TAG_VERSION"
            exit 1
          fi

      - name: Upload distributions
        uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/

  test-wheel:
    name: Test wheel (${{ matrix.os }})
    needs: build
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download distributions
        uses: actions/download-artifact@v6
        with:
          name: dist
          path: dist/

      - name: Install wheel
        run: python -m pip install dist/*.whl

      - name: CLI smoke
        run: |
          k --help >/dev/null
          k --version

      - name: PTY regression suite
        if: runner.os != 'Windows'
        run: python3 -B tests/test_pty_posix.py

      - name: Windows TCP regression suite
        if: runner.os == 'Windows'
        run: python -B tests/test_tcp_windows.py

  publish:
    name: Publish to PyPI
    needs: [build, test-wheel]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v6
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
